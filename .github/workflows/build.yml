name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyusb pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name boroscope stream.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boroscope-macos
          path: dist/boroscope

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: boroscope-macos

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          draft: false
          prerelease: false
          files: boroscope
          body: |
            Auto-built from latest `main`.

            **Usage:** `sudo ./boroscope` then open http://localhost:8080
